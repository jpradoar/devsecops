name: BASSICS-CICD
on:
  
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/*.tf'
      - '.github/workflows/devsecops.yaml'
  
  push:
    branches:
      - development

env:
  
  CONTINUE_ON_WORKFLOW_ERRORS: true # false si sos mala onda y queres que se detenga el workflow (y no mande a slack)
  SLACK_CHANNEL:    'general'
  SLACK_MSG_COLOR:  '#0092ff'

jobs:

#####################################
#  GENERICS
#####################################
  BASSICS-CICD:
    runs-on: ubuntu-latest  
    steps:
    
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Gitleaks to scan the entire history

      - name: Run Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        #env:
        #  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: ${{ env.CONTINUE_ON_WORKFLOW_ERRORS }} # Para que el workflow no se detenga


      - name: Slack Notification
        if: steps.gitleaks_check.outcome == 'failure'
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_CHANNEL:  ${{ env.SLACK_CHANNEL }}
          SLACK_COLOR:    '#fc0303'
          SLACK_WEBHOOK:  ${{ secrets.SLACK_WEBHOOK }}          
          SLACK_TITLE:    ':skull: Gitleaks'
          SLACK_MESSAGE:  'I found a security problem in this commit: ${{ github.sha }}'

